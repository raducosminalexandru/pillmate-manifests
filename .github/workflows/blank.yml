name: Update Deployment with Latest Image

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [new-image-published]

jobs:
  update-image:
    runs-on: ubuntu-latest
    environment: deploy
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest image tag from GHCR
        id: ghcr
        run: |
          REPO="horatiualex/pillmate"
          
          # Try GitHub API first
          RESPONSE=$(curl -s -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GHCR_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/users/horatiualex/packages/container/${REPO}/versions")
          
          HTTP_CODE="${RESPONSE: -3}"
          BODY="${RESPONSE%???}"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "GitHub API failed with HTTP Code: $HTTP_CODE"
            echo "Trying GHCR registry API..."
            
            # Fallback to GHCR registry API with token
            RESPONSE=$(curl -s -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GHCR_PAT }}" \
              "https://ghcr.io/v2/${REPO}/tags/list")
            
            HTTP_CODE="${RESPONSE: -3}"
            BODY="${RESPONSE%???}"
            
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Both APIs failed. HTTP Code: $HTTP_CODE"
              echo "Response: $BODY"
              echo "Please check your GHCR_PAT token permissions"
              exit 1
            fi
            
            # Parse registry API response
            LATEST_TAG=$(echo "$BODY" | jq -r '.tags[]' | grep '^v' | sort -V | tail -n1)
          else
            # Parse GitHub API response
            LATEST_TAG=$(echo "$BODY" | jq -r '.[0].metadata.container.tags[]' | grep '^v' | sort -V | tail -n1)
          fi
          
          if [ -z "$LATEST_TAG" ] || [ "$LATEST_TAG" = "null" ]; then
            echo "No valid tags found. Exiting."
            echo "Available response: $BODY"
            exit 1
          fi
          
          echo "Latest tag from GHCR: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT

      - name: Get current deployment tag
        id: current
        run: |
          CURRENT_TAG=$(grep 'image:.*ghcr.io' dev/deployment.yaml | sed -E 's/.*:(v[0-9]+[^[:space:]]*).*/\1/')
          
          if [ -z "$CURRENT_TAG" ]; then
            echo "No current tag found in deployment.yaml. Exiting."
            exit 1
          fi
          
          echo "Current tag in deployment.yaml: $CURRENT_TAG"
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_OUTPUT

      - name: Compare versions and set update flag
        id: compare
        run: |
          if [ "${{ steps.ghcr.outputs.latest_tag }}" != "${{ steps.current.outputs.current_tag }}" ]; then
            echo "Update needed: ${{ steps.current.outputs.current_tag }} -> ${{ steps.ghcr.outputs.latest_tag }}"
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "No update needed. Current version is latest."
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update deployment.yaml
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          CURRENT_TAG="${{ steps.current.outputs.current_tag }}"
          LATEST_TAG="${{ steps.ghcr.outputs.latest_tag }}"
          
          echo "Updating deployment.yaml from $CURRENT_TAG to $LATEST_TAG"
          
          sed -i "s|ghcr.io/horatiualex/pillmate:${CURRENT_TAG}|ghcr.io/horatiualex/pillmate:${LATEST_TAG}|g" dev/deployment.yaml
          
          if grep -q "$LATEST_TAG" dev/deployment.yaml; then
            echo "✅ Successfully updated deployment.yaml"
            cat dev/deployment.yaml | grep "image:"
          else
            echo "❌ Failed to update deployment.yaml"
            exit 1
          fi

      - name: Commit and push changes
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add dev/deployment.yaml
          git commit -m "🚀 Update image to ${{ steps.ghcr.outputs.latest_tag }}"
          git push

      - name: Send notification on update
        if: steps.compare.outputs.needs_update == 'true'
        run: |
          echo "🎉 Successfully updated deployment from ${{ steps.current.outputs.current_tag }} to ${{ steps.ghcr.outputs.latest_tag }}"

      - name: No update needed
        if: steps.compare.outputs.needs_update == 'false'
        run: |
          echo "✅ Deployment.yaml is already up-to-date with version ${{ steps.current.outputs.current_tag }}"
