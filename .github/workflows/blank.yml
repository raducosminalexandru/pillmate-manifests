name: Update Deployment with Latest Image

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get latest image tag from GHCR
        id: ghcr
        run: |
          REPO="horatiualex/pillmate"
          RESPONSE=$(curl -s -u "${{ github.actor }}:${{ secrets.GHCR_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://ghcr.io/v2/$REPO/tags/list)

          TAGS=$(echo "$RESPONSE" | jq -r '.tags[]' 2>/dev/null | grep '^v' | sort -V)
          LATEST_TAG=$(echo "$TAGS" | tail -n1)

          if [ -z "$LATEST_TAG" ]; then
            echo "No tags found in GHCR. Exiting."
            exit 1
          fi

          echo "Latest tag from GHCR: $LATEST_TAG"
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_ENV

      - name: Get current deployment tag
        id: current
        run: |
          CURRENT_TAG=$(grep 'image:' dev/deployment.yaml | sed -E 's/.*:(v[0-9]+).*/\1/')
          if [ -z "$CURRENT_TAG" ]; then
            echo "No current tag found in deployment.yaml. Exiting."
            exit 1
          fi
          echo "Current tag in deployment.yaml: $CURRENT_TAG"
          echo "current_tag=$CURRENT_TAG" >> $GITHUB_ENV

      - name: Update deployment.yaml
        if: env.latest_tag != env.current_tag
        run: |
          echo "Updating deployment.yaml from $CURRENT_TAG to $LATEST_TAG"
          sed -i "s/${CURRENT_TAG}/${LATEST_TAG}/" dev/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/deployment.yaml
          git commit -m "Update image to ${LATEST_TAG}"
          git push

      - name: No update needed
        if: env.latest_tag == env.current_tag
        run: echo "Deployment.yaml already up-to-date."
